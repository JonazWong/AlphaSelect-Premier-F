alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
databases:
- cluster_name: premier
  db_name: defaultdb
  engine: PG
  name: premier
  production: true
features:
- buildpack-stack=ubuntu-22
ingress:
  rules:
  - component:
      name: alphaselect-premier-f-backend
    match:
      authority:
        exact: ""
      path:
        prefix: /api
  - component:
      name: alphaselect-premier-f-backend
    match:
      authority:
        exact: ""
      path:
        prefix: /ws
  - component:
      name: alphaselect-premier-f-backend
    match:
      authority:
        exact: ""
      path:
        prefix: /health
  - component:
      name: alphaselect-premier-f-backend
    match:
      authority:
        exact: ""
      path:
        prefix: /docs
  - component:
      name: alphaselect-premier-f-backend
    match:
      authority:
        exact: ""
      path:
        prefix: /redoc
  - component:
      name: alphaselect-premier-f-frontend
    match:
      authority:
        exact: ""
      path:
        prefix: /
name: alpha
region: sgp
services:
- dockerfile_path: backend/Dockerfile
  envs:
  - key: SECRET_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: MEXC_API_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: MEXC_SECRET_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DATABASE_URL
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: NEXT_PUBLIC_API_URL
    scope: RUN_TIME
    value: ${APP_URL}
  - key: ALLOWED_ORIGINS
    scope: RUN_AND_BUILD_TIME
    value: ${APP_URL}
  - key: MEXC_CONTRACT_BASE_URL
    scope: RUN_AND_BUILD_TIME
    value: https://contract.mexc.com
  - key: AI_MODEL_DIR
    scope: RUN_TIME
    value: /app/ai_models
  - key: NEXT_PUBLIC_WS_URL
    scope: RUN_TIME
    value: ${APP_URL}
  github:
    branch: main
    repo: JonazWong/AlphaSelect-Premier-F
  http_port: 8000
  instance_count: 2
  instance_size_slug: apps-s-1vcpu-1gb
  name: alphaselect-premier-f-backend
  source_dir: backend
- dockerfile_path: frontend/Dockerfile
  envs:
  - key: PORT
    scope: RUN_AND_BUILD_TIME
    value: "3000"
  - key: NEXT_PUBLIC_API_URL
    scope: RUN_AND_BUILD_TIME
    value: ${APP_URL}
  - key: NEXT_PUBLIC_WS_URL
    scope: RUN_AND_BUILD_TIME
    value: ${APP_URL}
  github:
    branch: main
    repo: JonazWong/AlphaSelect-Premier-F
  http_port: 3000
  instance_count: 2
  instance_size_slug: apps-s-1vcpu-1gb
  name: alphaselect-premier-f-frontend
  source_dir: frontend

name: alphaselect-premier-f
region: sgp

ingress:
  rules:
    - component:
        name: backend
      match:
        path:
          prefix: /api
    - component:
        name: backend
      match:
        path:
          prefix: /ws
    - component:
        name: frontend
      match:
        path:
          prefix: /

databases:
  - name: premier
    engine: PG
    version: "16"
    production: false
    db: premier

  - name: redis
    engine: REDIS
    version: "7"
    production: false

services:
  - name: backend
    github:
      repo: JonazWong/AlphaSelect-Premier-F
      branch: main
      deploy_on_push: false
    source_dir: backend
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: professional-xs
    envs:
      # Managed database URLs are automatically injected by App Platform.
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${premier.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      # Provide MEXC credentials via App Platform secret UI after creation.
      - key: MEXC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MEXC_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      # doadmin connection string for schema GRANT (DO PostgreSQL 15+)
      # Format: postgresql://doadmin:<password>@<host>:25060/premier?sslmode=require
      - key: ADMIN_DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      # The app user name created by DO (shown in DB -> Users & Databases)
      - key: DB_APP_USER
        scope: RUN_TIME
        type: SECRET
      - key: MEXC_CONTRACT_BASE_URL
        scope: RUN_TIME
        value: "https://contract.mexc.com"
      - key: MEXC_SPOT_BASE_URL
        scope: RUN_TIME
        value: "https://api.mexc.com"
      - key: AI_MODEL_DIR
        scope: RUN_TIME
        value: "/app/ai_models"
      - key: ALLOWED_ORIGINS
        scope: RUN_TIME
        value: ${APP_URL}
    health_check:
      http_path: /health

  - name: frontend
    github:
      repo: JonazWong/AlphaSelect-Premier-F
      branch: main
      deploy_on_push: false
    source_dir: frontend
    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}
      - key: NEXT_PUBLIC_WS_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}
    health_check:
      http_path: /health

workers:
  - name: celery-worker
    github:
      repo: JonazWong/AlphaSelect-Premier-F
      branch: main
      deploy_on_push: false
    source_dir: backend
    dockerfile_path: Dockerfile
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${premier.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      - key: MEXC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MEXC_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: AI_MODEL_DIR
        scope: RUN_TIME
        value: "/app/ai_models"
    run_command: "celery -A app.tasks.celery_app worker --loglevel=info"

name: alpha
region: sgp

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

features:
  - buildpack-stack=ubuntu-22

databases:
  - cluster_name: premier
    db_name: defaultdb
    db_user: doadmin
    engine: PG
    name: premier
    production: true
  - name: redis
    engine: REDIS
    version: "7"
    production: false

ingress:
  rules:
    - component:
        name: alphaselect-premier-f-backend
      match:
        path:
          prefix: /api
    - component:
        name: alphaselect-premier-f-backend
      match:
        path:
          prefix: /ws
    - component:
        name: alphaselect-premier-f-backend
      match:
        path:
          prefix: /health
    - component:
        name: alphaselect-premier-f-frontend
      match:
        path:
          prefix: /

services:
  - name: alphaselect-premier-f-backend
    github:
      repo: JonazWong/AlphaSelect-Premier-F
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    http_port: 8000
    instance_count: 2
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: REDIS_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${redis.REDIS_URL}
      - key: MEXC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MEXC_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: ADMIN_DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: db_cluster_name
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: AI_MODEL_DIR
        scope: RUN_AND_BUILD_TIME
        value: /app/ai_models
      - key: ALLOWED_ORIGINS
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}
      - key: MEXC_CONTRACT_BASE_URL
        scope: RUN_TIME
        value: https://contract.mexc.com
      - key: MEXC_SPOT_BASE_URL
        scope: RUN_TIME
        value: https://api.mexc.com
    health_check:
      http_path: /health

  - name: alphaselect-premier-f-frontend
    github:
      repo: JonazWong/AlphaSelect-Premier-F
      branch: main
      deploy_on_push: true
    source_dir: frontend
    dockerfile_path: frontend/Dockerfile
    http_port: 3000
    instance_count: 2
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}
      - key: NEXT_PUBLIC_WS_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}

workers:
  - name: celery-worker
    github:
      repo: JonazWong/AlphaSelect-Premier-F
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: REDIS_URL
        scope: RUN_AND_BUILD_TIME
        value: ${redis.REDIS_URL}
      - key: MEXC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MEXC_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: AI_MODEL_DIR
        scope: RUN_AND_BUILD_TIME
        value: /app/ai_models
    run_command: celery -A app.tasks.celery_app worker --loglevel=info

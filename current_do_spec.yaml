  - component:
      name: alphaselect-premier-f-backend
    match:
      path:
        prefix: /api
  - component:
      name: alphaselect-premier-f-backend
    match:
      path:
        prefix: /ws
  - component:
      name: alphaselect-premier-f-frontend
    match:
      path:
        prefix: /
name: alpha
region: sgp

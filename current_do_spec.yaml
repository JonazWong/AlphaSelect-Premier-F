alerts:
- disabled: true
  rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
databases:
- cluster_name: premier
  db_name: premier
  db_user: doadmin
  engine: PG
  name: premier
  production: true
  version: "16"
features:
- buildpack-stack=ubuntu-22
ingress:

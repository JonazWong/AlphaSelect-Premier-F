# ========================================
# DigitalOcean App Platform - 修复后的配置
# ========================================
# 使用方法：
# 1. 进入 DigitalOcean 控制台：https://cloud.digitalocean.com/apps
# 2. 选择您的应用 "alphaselect-premier-f"
# 3. 点击 Settings → App Spec
# 4. 点击 "Edit" 按钮
# 5. 复制下面整个 YAML 配置（从 name 到最后）
# 6. 粘贴替换整个配置
# 7. 点击 "Save" → 然后点击页面顶部的 "Deploy"
# ========================================

name: alphaselect-premier-f
region: sgp

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

features:
  - buildpack-stack=ubuntu-22

ingress:
  rules:
    - component:
        name: backend
      match:
        path:
          prefix: /api
    - component:
        name: backend
      match:
        path:
          prefix: /ws
    - component:
        name: frontend
      match:
        path:
          prefix: /

databases:
  - name: premier
    cluster_name: premier
    db_name: premier
    db_user: doadmin
    engine: PG
    production: true
    version: "16"

  - name: redis
    cluster_name: redis
    engine: REDIS
    version: "7"
    production: true

services:
  - name: backend
    github:
      repo: JonazWong/AlphaSelect-Premier-F
      branch: main
      deploy_on_push: false
    source_dir: backend
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: professional-xs
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${premier.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      - key: MEXC_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: MEXC_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: ADMIN_DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DB_APP_USER
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: MEXC_CONTRACT_BASE_URL
        scope: RUN_TIME
        value: "https://contract.mexc.com"
      - key: MEXC_SPOT_BASE_URL
        scope: RUN_TIME
        value: "https://api.mexc.com"
      - key: AI_MODEL_DIR
        scope: RUN_TIME
        value: "/app/ai_models"
      - key: ALLOWED_ORIGINS
        scope: RUN_TIME
        value: ${APP_URL}
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

  - name: frontend
    github:
      repo: JonazWong/AlphaSelect-Premier-F
      branch: main
      deploy_on_push: false
    source_dir: frontend
    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}
      - key: NEXT_PUBLIC_WS_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

workers:
  - name: celery-worker
    github:
      repo: JonazWong/AlphaSelect-Premier-F
      branch: main
      deploy_on_push: false
    source_dir: backend
    dockerfile_path: Dockerfile
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${premier.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      - key: MEXC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MEXC_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: AI_MODEL_DIR
        scope: RUN_TIME
        value: "/app/ai_models"
    run_command: "celery -A app.tasks.celery_app worker --loglevel=info"

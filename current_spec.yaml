  - key: MEXC_API_KEY
    scope: RUN_TIME
    type: SECRET
    value: EV[1:IsBJTeW53wuQpRggRtLq+x6UCQ87t1VD:/nIrkDfkW6K2QAjmS82QQA==]
  - key: MEXC_SECRET_KEY
    scope: RUN_TIME
    type: SECRET
    value: EV[1:wsLCH+x3ecPgoLbdHj2onslOKgAO+jWF:VQdIPsUe9ix5uCdVfEO/hA==]
  - key: SECRET_KEY
    scope: RUN_TIME
    type: SECRET
    value: EV[1:CsaobYGjHV6INxzuaCHsR74I25wClvVy:EXpKrvNcH1sp73yS3k86yg==]
  - key: AI_MODEL_DIR
    scope: RUN_TIME
    value: /app/ai_models
  github:
    branch: main
    repo: JonazWong/AlphaSelect-Premier-F
  instance_count: 1
  instance_size_slug: basic-xs
  name: celery-worker
  run_command: celery -A app.tasks.celery_app worker --loglevel=info
  source_dir: backend

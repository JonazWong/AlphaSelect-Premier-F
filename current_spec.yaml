databases:
- cluster_name: premier
  db_name: premier
  db_user: doadmin
  engine: PG
  name: premier
  production: true
  version: "16"
ingress:
  rules:
  - component:
      name: alphaselect-premier-f-backend
    match:
      path:
        prefix: /api
  - component:
      name: alphaselect-premier-f-backend
    match:
      path:
        prefix: /ws
  - component:
      name: alphaselect-premier-f-frontend
    match:
      path:
        prefix: /
name: alpha
region: sgp
services:
- dockerfile_path: Dockerfile
  envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    value: ${premier.DATABASE_URL}
  - key: REDIS_URL
    scope: RUN_AND_BUILD_TIME
    type: SECRET
    value: EV[1:+CCwzY6EBuCMh+9q1uOWwBEfSPsCZaiw:S5TEMsMWh2Gont2pZ0UN8Q==]
  - key: MEXC_API_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
    value: EV[1:BIPmV/oGIhPGaeseBF7/s8LjyZstC8Dx:VkUhhyQ+TKM7ADLD2X39+g==]
  - key: MEXC_SECRET_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
    value: EV[1:1L8OVX4Y5yHgDpviV89GJKgb81GxSJXP:7j/sx8dd+yRZpOHZXSvHVQ==]
  - key: SECRET_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
    value: EV[1:gBQAWw7zrvNKOTsZXhJpAf/1jqBSu4eF:FXza0reuXBnJ9LzUV2TX1w==]
  - key: ADMIN_DATABASE_URL
    scope: RUN_AND_BUILD_TIME
    type: SECRET
    value: EV[1:g74PULq3Yd7yT68l++k7x8Fv57YlYmQ1:JNBEcNvYMGyTFQWpF2bJZA==]
  - key: DB_APP_USER
    scope: RUN_AND_BUILD_TIME
    type: SECRET
    value: EV[1:59CMPnu1lkjvEsG/BZTsMsbwYrQcZPbM:qycd1V9S7Urjm9FhU7JDgQ==]
  - key: MEXC_CONTRACT_BASE_URL
    scope: RUN_TIME
    value: https://contract.mexc.com
  - key: MEXC_SPOT_BASE_URL
    scope: RUN_TIME
    value: https://api.mexc.com
  - key: AI_MODEL_DIR
    scope: RUN_TIME
    value: /app/ai_models
  - key: ALLOWED_ORIGINS
    scope: RUN_TIME
    value: ${APP_URL}
  github:
    branch: main
    repo: JonazWong/AlphaSelect-Premier-F
  health_check:
    failure_threshold: 3
    http_path: /health
    initial_delay_seconds: 30
    period_seconds: 10
    success_threshold: 1
    timeout_seconds: 5
  http_port: 8000
  instance_count: 1
  instance_size_slug: professional-xs
  name: alphaselect-premier-f-backend
  source_dir: backend
- dockerfile_path: Dockerfile
  envs:
  - key: NEXT_PUBLIC_API_URL
    scope: RUN_AND_BUILD_TIME
    value: ${APP_URL}
  - key: NEXT_PUBLIC_WS_URL
    scope: RUN_AND_BUILD_TIME
    value: ${APP_URL}
  github:
    branch: main
    repo: JonazWong/AlphaSelect-Premier-F
  health_check:
    failure_threshold: 3
    http_path: /health
    initial_delay_seconds: 30
    period_seconds: 10
    success_threshold: 1
    timeout_seconds: 5
  http_port: 3000
  instance_count: 1
  instance_size_slug: basic-xxs
  name: alphaselect-premier-f-frontend
  source_dir: frontend
workers:
- dockerfile_path: Dockerfile
  envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    value: ${premier.DATABASE_URL}
  - key: REDIS_URL
